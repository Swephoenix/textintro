<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interpellationsdebatt i Riksdagen</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-color: #f2b300;
      --text-color: #ffffff; 
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--bg-color);
    }

    body {
      position: relative; /* Viktigt för mönsterlagret */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* --- MÖNSTERLAGER I BAKGRUNDEN --- */
    #pattern-layer,
    #marble-canvas,
    #shapes-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0; /* Hamnar bakom texten */
      pointer-events: none; /* Stör inte klick på texten */
    }

    #marble-canvas,
    #shapes-canvas {
      display: none;
    }

    /* Mönster 1: Prickar */
    .pattern-dots {
      background-image: radial-gradient(rgba(0, 0, 0, 0.08) 2px, transparent 2px);
      background-size: 30px 30px;
    }

    /* Mönster 2: Diagonala Linjer */
    .pattern-lines {
      background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 0, 0, 0.04) 10px, rgba(0, 0, 0, 0.04) 12px);
    }

    /* Mönster 3: Rutnät */
    .pattern-grid {
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* --- UI OCH INNEHÅLL --- */
    #instructions {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 0, 0, 0.4);
      font-size: 14px;
      pointer-events: none;
      font-weight: bold;
      letter-spacing: 1px;
      z-index: 10;
    }

    .slide {
      position: relative;
      z-index: 1; /* Håller texten över mönstret */
      width: 100%;
      max-width: 1600px;
      min-height: 900px;
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 60px;
      transition: color 0.3s ease;
    }

    .title {
      font-size: clamp(42px, 6vw, 88px);
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 28px 0;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Liten skugga så texten poppar mer mot mönstret */
    }

    .date {
      font-size: clamp(28px, 3.2vw, 56px);
      font-weight: 700;
      line-height: 1.15;
      margin: 0 0 90px 0;
      opacity: 0.9;
    }

    .content {
      max-width: 1100px;
      font-size: clamp(34px, 4vw, 70px);
      font-weight: 800;
      line-height: 1.18;
      margin: 0;
      text-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    /* REDIGERBAR TEXT */
    [contenteditable="true"] {
      outline: none;
      cursor: text;
      transition: opacity 0.2s;
    }
    [contenteditable="true"]:hover { opacity: 0.7; }

    @media (max-width: 900px) {
      .slide { min-height: 100vh; padding: 48px 24px; }
      .date { margin-bottom: 56px; }
    }

    /* --- VERKTYGSPANEL --- */
    #toolbar {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: rgba(255, 255, 255, 0.95);
      padding: 16px 20px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 9999;
      font-family: Arial, sans-serif;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }

    /* Färgknappar */
    .color-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .color-btn:hover { transform: scale(1.1); }
    .color-btn.active { border-color: #333; }

    /* Mönsterknappar */
    .pattern-btn {
      background: #eee;
      border: 2px solid transparent;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      color: #333;
    }
    .pattern-btn:hover { background: #e0e0e0; }
    .pattern-btn.active { border-color: #333; background: #ddd; }

    /* --- SPARA-KNAPP --- */
    #save-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: #002045;
      color: #ffffff;
      border: none;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, background-color 0.2s;
      z-index: 9999;
    }
    #save-btn:hover { transform: scale(1.05); background-color: #296b9f; }

    /* Export-läge */
    body.exporting {
      width: 1920px !important;
      height: 1080px !important;
      min-height: 1080px !important;
      padding: 0 !important;
      margin: 0 !important;
      overflow: hidden !important;
    }

    body.exporting #save-btn,
    body.exporting #instructions,
    body.exporting #toolbar {
      display: none !important;
    }
  </style>
</head>
<body>
  
  <div id="instructions">Klicka på texten för att redigera den</div>

  <!-- LAGER FÖR MÖNSTRET -->
  <div id="pattern-layer" class=""></div>

  <!-- VERKTYGSPANEL FÖR FÄRG OCH MÖNSTER -->
  <div id="toolbar">
    <div class="tool-group">
      <span>Text:</span>
      <button class="color-btn" data-color="#296b9f" style="background-color: #296b9f;" title="Mellanblå"></button>
      <button class="color-btn" data-color="#002045" style="background-color: #002045;" title="Mörkblå"></button>
      <button class="color-btn active" data-color="#ffffff" style="background-color: #ffffff; border: 3px solid #333;" title="Kritvit"></button>
    </div>
    <div class="tool-group">
      <span>Mönster:</span>
      <button class="pattern-btn active" data-pattern="">Ingen</button>
      <button class="pattern-btn" data-pattern="pattern-dots">Prickar</button>
      <button class="pattern-btn" data-pattern="pattern-lines">Linjer</button>
      <button class="pattern-btn" data-pattern="pattern-grid">Rutnät</button>
      <button class="pattern-btn" data-pattern="marble">Marmor</button>
      <button class="pattern-btn" data-pattern="shapes">Cirklar/Fyrkanter</button>
    </div>
  </div>

  <canvas id="marble-canvas" aria-hidden="true"></canvas>
  <canvas id="shapes-canvas" aria-hidden="true"></canvas>
  <div class="slide">
    <h1 class="title" contenteditable="true" spellcheck="false">Interpellationsdebatt i Riksdagen</h1>
    <div class="date" contenteditable="true" spellcheck="false">27 mars 2026</div>
    <div class="content" contenteditable="true" spellcheck="false">
      Jakt och fiske på statlig mark<br>
      av Elsa Widding till Landsbygdsminister Peter Kullgren
    </div>
  </div>

  <button id="save-btn">💾 Spara som 4K</button>

  <script>
    // --- LOGIK FÖR FÄRGBYTE ---
    const colorBtns = document.querySelectorAll('.color-btn');
    colorBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const newColor = e.target.getAttribute('data-color');
        document.documentElement.style.setProperty('--text-color', newColor);
        
        colorBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');

        colorBtns.forEach(b => {
            if (b.dataset.color === "#ffffff") {
                b.style.border = b.classList.contains('active') ? "3px solid #333" : "1px solid #ccc";
            }
        });
      });
    });

    // --- LOGIK FÖR MÖNSTERBYTE ---
    const patternBtns = document.querySelectorAll('.pattern-btn');
    const patternLayer = document.getElementById('pattern-layer');
    const marbleCanvas = document.getElementById('marble-canvas');
    const marbleCtx = marbleCanvas.getContext('2d');
    const shapesCanvas = document.getElementById('shapes-canvas');
    const shapesCtx = shapesCanvas.getContext('2d');

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      const bigint = parseInt(clean, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lightenColor(rgb, amount) {
      return {
        r: clamp(Math.round(rgb.r + (255 - rgb.r) * amount), 0, 255),
        g: clamp(Math.round(rgb.g + (255 - rgb.g) * amount), 0, 255),
        b: clamp(Math.round(rgb.b + (255 - rgb.b) * amount), 0, 255)
      };
    }

    function rgbString(color, alpha = 1) {
      return `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
    }

    function jitterWidth(base, variation) {
      return Math.max(0.6, base + (Math.random() - 0.5) * variation);
    }

    function resizeMarbleCanvas() {
      const dpr = window.devicePixelRatio || 1;
      marbleCanvas.width = Math.floor(window.innerWidth * dpr);
      marbleCanvas.height = Math.floor(window.innerHeight * dpr);
      marbleCanvas.style.width = `${window.innerWidth}px`;
      marbleCanvas.style.height = `${window.innerHeight}px`;
      marbleCtx.setTransform(1, 0, 0, 1, 0, 0);
      marbleCtx.scale(dpr, dpr);
    }

    function resizeShapesCanvas() {
      const dpr = window.devicePixelRatio || 1;
      shapesCanvas.width = Math.floor(window.innerWidth * dpr);
      shapesCanvas.height = Math.floor(window.innerHeight * dpr);
      shapesCanvas.style.width = `${window.innerWidth}px`;
      shapesCanvas.style.height = `${window.innerHeight}px`;
      shapesCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapesCtx.scale(dpr, dpr);
    }

    function drawSoftTexture(width, height, baseRgb) {
      marbleCtx.fillStyle = rgbString(baseRgb, 1);
      marbleCtx.fillRect(0, 0, width, height);

      for (let i = 0; i < 140; i++) {
        const alpha = 0.02 + Math.random() * 0.035;
        const radius = 80 + Math.random() * 240;
        const x = Math.random() * width;
        const y = Math.random() * height;

        const glow = lightenColor(baseRgb, 0.10 + Math.random() * 0.10);
        const grad = marbleCtx.createRadialGradient(x, y, 0, x, y, radius);
        grad.addColorStop(0, rgbString(glow, alpha));
        grad.addColorStop(1, rgbString(glow, 0));

        marbleCtx.fillStyle = grad;
        marbleCtx.beginPath();
        marbleCtx.arc(x, y, radius, 0, Math.PI * 2);
        marbleCtx.fill();
      }
    }

    function drawVein(width, height, veinRgb) {
      const startSide = Math.floor(Math.random() * 4);
      let x;
      let y;

      if (startSide === 0) {
        x = Math.random() * width;
        y = -40;
      } else if (startSide === 1) {
        x = width + 40;
        y = Math.random() * height;
      } else if (startSide === 2) {
        x = Math.random() * width;
        y = height + 40;
      } else {
        x = -40;
        y = Math.random() * height;
      }

      const points = [];
      const centerX = width / 2;
      const centerY = height / 2;
      let angle = Math.atan2(centerY - y, centerX - x) + (Math.random() - 0.5) * 0.9;
      let enteredCanvas = false;
      let steps = 0;

      while (steps < 40) {
        points.push({ x, y });

        const step = 50 + Math.random() * 130;
        angle += (Math.random() - 0.5) * 1.2;

        x += Math.cos(angle) * step;
        y += Math.sin(angle) * step;
        steps += 1;

        const insideCanvas = x >= 0 && x <= width && y >= 0 && y <= height;
        if (insideCanvas) {
          enteredCanvas = true;
        } else if (enteredCanvas) {
          points.push({ x, y });
          break;
        }
      }

      marbleCtx.save();
      marbleCtx.lineCap = 'round';
      marbleCtx.lineJoin = 'round';
      const widthBase = 1.5 + Math.random() * 2.5;
      const alphaBase = 0.18 + Math.random() * 0.22;

      for (let layer = 0; layer < 3; layer++) {
        marbleCtx.beginPath();
        marbleCtx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 1; i++) {
          const midX = (points[i].x + points[i + 1].x) / 2;
          const midY = (points[i].y + points[i + 1].y) / 2;
          marbleCtx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
        }

        marbleCtx.lineTo(points[points.length - 1].x, points[points.length - 1].y);

        marbleCtx.strokeStyle = rgbString(veinRgb, alphaBase / (layer + 0.7));
        marbleCtx.lineWidth = jitterWidth(widthBase * (3 - layer), 2.4 + layer * 0.5);
        marbleCtx.stroke();
      }

      marbleCtx.restore();
    }

    function drawMarbleBackground() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const baseRgb = hexToRgb('#f2b400');
      const veinRgb = lightenColor(baseRgb, 0.45 + Math.random() * 0.18);

      drawSoftTexture(width, height, baseRgb);

      const veinCount = 4 + Math.floor(Math.random() * 4);
      for (let i = 0; i < veinCount; i++) {
        drawVein(width, height, veinRgb);
      }

      for (let i = 0; i < 60; i++) {
        const alpha = 0.015 + Math.random() * 0.03;
        const size = 30 + Math.random() * 120;
        const x = Math.random() * width;
        const y = Math.random() * height;
        const mist = lightenColor(baseRgb, 0.20 + Math.random() * 0.15);

        marbleCtx.fillStyle = rgbString(mist, alpha);
        marbleCtx.beginPath();
        marbleCtx.ellipse(
          x,
          y,
          size * (0.8 + Math.random() * 0.5),
          size * (0.4 + Math.random() * 0.3),
          Math.random() * Math.PI,
          0,
          Math.PI * 2
        );
        marbleCtx.fill();
      }
    }

    function drawShapesBackground() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const baseRgb = hexToRgb('#f2b300');

      shapesCtx.clearRect(0, 0, width, height);
      shapesCtx.fillStyle = rgbString(baseRgb, 1);
      shapesCtx.fillRect(0, 0, width, height);

      for (let i = 0; i < 78; i++) {
        const size = 40 + Math.random() * 180;
        const x = Math.random() * width;
        const y = Math.random() * height;
        const fill = lightenColor(baseRgb, 0.16 + Math.random() * 0.34);
        const alpha = 0.2 + Math.random() * 0.24;
        const rotation = Math.random() * Math.PI;

        shapesCtx.save();
        shapesCtx.translate(x, y);
        shapesCtx.rotate(rotation);
        shapesCtx.fillStyle = rgbString(fill, alpha);

        if (Math.random() < 0.5) {
          shapesCtx.beginPath();
          shapesCtx.arc(0, 0, size / 2, 0, Math.PI * 2);
          shapesCtx.fill();
        } else {
          const edge = size * (0.75 + Math.random() * 0.4);
          shapesCtx.fillRect(-edge / 2, -edge / 2, edge, edge);
        }

        if (Math.random() < 0.7) {
          shapesCtx.strokeStyle = rgbString(lightenColor(fill, 0.28), 0.28 + Math.random() * 0.2);
          shapesCtx.lineWidth = 2 + Math.random() * 4;

          if (Math.random() < 0.5) {
            shapesCtx.beginPath();
            shapesCtx.arc(0, 0, size * (0.3 + Math.random() * 0.2), 0, Math.PI * 2);
            shapesCtx.stroke();
          } else {
            const innerEdge = size * (0.32 + Math.random() * 0.24);
            shapesCtx.strokeRect(-innerEdge / 2, -innerEdge / 2, innerEdge, innerEdge);
          }
        }

        shapesCtx.restore();
      }
    }

    function setPattern(newPatternClass) {
      patternLayer.className = '';
      marbleCanvas.style.display = 'none';
      shapesCanvas.style.display = 'none';

      if (newPatternClass === 'marble') {
        resizeMarbleCanvas();
        drawMarbleBackground();
        marbleCanvas.style.display = 'block';
        return;
      }

      if (newPatternClass === 'shapes') {
        resizeShapesCanvas();
        drawShapesBackground();
        shapesCanvas.style.display = 'block';
        return;
      }

      if (newPatternClass !== '') {
        patternLayer.classList.add(newPatternClass);
      }
    }
    
    patternBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const newPatternClass = e.target.getAttribute('data-pattern');
        setPattern(newPatternClass);

        // Visuell uppdatering av knapparna
        patternBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
      });
    });

    window.addEventListener('resize', () => {
      const activePatternBtn = document.querySelector('.pattern-btn.active');
      if (activePatternBtn && (activePatternBtn.dataset.pattern === 'marble' || activePatternBtn.dataset.pattern === 'shapes')) {
        setPattern(activePatternBtn.dataset.pattern);
      }
    });

    // --- LOGIK FÖR SPARNING ---
    document.getElementById('save-btn').addEventListener('click', () => {
      if (document.activeElement) {
        document.activeElement.blur();
      }

      const btn = document.getElementById('save-btn');
      const originalText = btn.innerText;
      btn.innerText = "⏳ Sparar...";
      
      document.body.classList.add('exporting');

      setTimeout(() => {
        html2canvas(document.body, {
          width: 1920,
          height: 1080,
          windowWidth: 1920,
          windowHeight: 1080,
          scale: 2, 
          backgroundColor: "#f2b300" 
        }).then(canvas => {
          const link = document.createElement('a');
          const today = new Date().toISOString().split('T')[0];
          link.download = `intro-debatt-${today}-4k.png`;
          
          link.href = canvas.toDataURL('image/png');
          link.click();

          document.body.classList.remove('exporting');
          btn.innerText = originalText;
        }).catch(err => {
          console.error("Fel vid skapande av bild: ", err);
          document.body.classList.remove('exporting');
          btn.innerText = "❌ Något gick fel";
          setTimeout(() => btn.innerText = originalText, 3000);
        });
      }, 150);
    });
  </script>
</body>
</html>
